apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: atoms
spec:
  replicas: 2
  selector:
    matchLabels: { app: backend }
  template:
    metadata:
      labels: { app: backend }
    spec:
      containers:
        - name: backend
          image: ghcr.io/your-org/atoms-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef: { name: atoms-config }
            - secretRef: { name: atoms-secrets }
          readinessProbe:
            httpGet: { path: /api/health, port: 8000 }
            initialDelaySeconds: 10
          resources:
            requests: { cpu: 250m, memory: 256Mi }
            limits: { cpu: "1", memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: atoms
spec:
  selector: { app: backend }
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: atoms
spec:
  replicas: 2
  selector:
    matchLabels: { app: worker }
  template:
    metadata:
      labels: { app: worker }
    spec:
      containers:
        - name: worker
          image: ghcr.io/your-org/atoms-backend:latest
          command: ["celery", "-A", "app.workers.celery_app", "worker", "-l", "info"]
          envFrom:
            - configMapRef: { name: atoms-config }
            - secretRef: { name: atoms-secrets }
