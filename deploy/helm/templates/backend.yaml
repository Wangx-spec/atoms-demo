apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-backend
  labels: { app: atoms-backend }
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels: { app: atoms-backend }
  template:
    metadata:
      labels: { app: atoms-backend }
    spec:
      containers:
        - name: backend
          image: "{{ .Values.image.registry }}/{{ .Values.backend.image }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.port }}
          env:
            {{- range $key, $value := .Values.backend.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            - name: API_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.apiSecretKeyRef }}
                  key: api-secret-key
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.deepseekApiKeyRef }}
                  key: deepseek-api-key
          readinessProbe:
            httpGet: { path: /api/health, port: {{ .Values.backend.port }} }
            initialDelaySeconds: 10
          livenessProbe:
            httpGet: { path: /api/health, port: {{ .Values.backend.port }} }
            initialDelaySeconds: 20
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector: { app: atoms-backend }
  ports:
    - port: {{ .Values.backend.port }}
      targetPort: {{ .Values.backend.port }}
