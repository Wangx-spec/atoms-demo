# Edge reverse proxy: terminates client traffic and routes to frontend/backend.
# For an API gateway with auth/rate-limit plugins, Kong can sit in front of this
# (see the commented compose snippet at the bottom of infra/docker-compose.yml).

events {
    worker_connections 1024;
}

http {
    upstream frontend_upstream {
        server frontend:80;
    }
    upstream backend_upstream {
        server backend:8000;
    }

    # Basic rate limiting zone (10r/s per client IP, burst handled per-location).
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    server {
        listen 80;
        server_name _;
        client_max_body_size 20m;

        location / {
            proxy_pass http://frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_read_timeout 3600s;
        }

        location /ws/ {
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }
    }
}
