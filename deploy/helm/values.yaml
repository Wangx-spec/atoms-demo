image:
  registry: ghcr.io/your-org
  pullPolicy: IfNotPresent
  tag: latest

backend:
  replicas: 2
  image: atoms-backend
  port: 8000
  env:
    LLM_PROVIDER: deepseek
    DATABASE_URL: postgresql+asyncpg://atoms:atoms@postgres:5432/atoms_demo
    REDIS_URL: redis://redis:6379/0
    CELERY_BROKER_URL: redis://redis:6379/0
    CELERY_RESULT_BACKEND: redis://redis:6379/1
    MINIO_ENDPOINT: minio:9000
    QDRANT_URL: http://qdrant:6333
  resources:
    requests: { cpu: 250m, memory: 256Mi }
    limits: { cpu: "1", memory: 512Mi }

frontend:
  replicas: 2
  image: atoms-frontend
  port: 80

worker:
  replicas: 2
  image: atoms-backend
  command: ["celery", "-A", "app.workers.celery_app", "worker", "-l", "info"]

# Datastores: use managed services in production; these toggle bundled deps.
postgres:
  enabled: true
redis:
  enabled: true
minio:
  enabled: true
qdrant:
  enabled: true

ingress:
  enabled: true
  className: nginx
  host: atoms.example.com
  tls:
    enabled: false
    secretName: atoms-tls

# Sensitive values should come from a Secret, not values.yaml.
secrets:
  apiSecretKeyRef: atoms-api-secret
  deepseekApiKeyRef: atoms-deepseek-key
