apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-worker
  labels: { app: atoms-worker }
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels: { app: atoms-worker }
  template:
    metadata:
      labels: { app: atoms-worker }
    spec:
      containers:
        - name: worker
          image: "{{ .Values.image.registry }}/{{ .Values.worker.image }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: {{ .Values.worker.command | toJson }}
          env:
            {{- range $key, $value := .Values.backend.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
